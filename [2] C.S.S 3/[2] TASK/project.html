<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="project.css">
</head>

<body>


    <div class="product_card">
        <div class="product_image">
            <img class="real_image
            " src="https://images.unsplash.com/photo-1740711152088-88a009e877bb?q=80&w=880&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="Men's Shirt">
        </div>

        <div class="product_info">
            <h3 class="product_title">Shirt for Men</h3>
            <p class="product_description">Lorem ipsum dolor sit amet consectetur adipisicing elit. Cumque reprehenderit
                repellendus excepturi quia
                aperiam quisquam cum atque temporibus vel sed.</p>

            <div class="product_bottom">
                <span class="price">2000</span>
                <button class="btn">Add to Cart</button>
            </div>
        </div>
    </div>


</body>

</html>
